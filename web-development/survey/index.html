<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krav Maga Student Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="container">
        <h1>Krav Maga Student Registration ⭐⭐⭐⭐⭐</h1>
        <p class="subtitle">Apply to join the academy and begin your training journey.</p>

        <form>

            <!-- Full Name -->
            <label for="name">Full Name</label>
            <input type="text" id="name" required>

            <!-- Email -->
            <label for="email">Email Address</label>
            <input type="email" id="email" required>

            <!-- Age -->
            <label for="age">Age</label>
            <input type="number" id="age" min="10" max="80" required>

            <!-- Gender -->
            <label>Gender (optional)</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="male"> Male</label>
                <label><input type="radio" name="gender" value="female"> Female</label>
            </div>

            <!-- Fitness Level -->
            <label for="fitness">Fitness Level</label>
            <select id="fitness" required>
                <option value="">Select one</option>
                <option value="beginner">Beginner</option>
                <option value="intermediate">Intermediate</option>
                <option value="advanced">Advanced</option>
            </select>

            <!-- Martial Arts Experience -->
            <label>Previous Martial Arts Experience?</label>
            <div class="checkbox-group">
                <label><input type="checkbox" value="none"> None</label>
                <label><input type="checkbox" value="boxing"> Boxing</label>
                <label><input type="checkbox" value="muaythai"> Muay Thai</label>
                <label><input type="checkbox" value="bjj"> Brazilian Jiu-Jitsu</label>
                <label><input type="checkbox" value="karate"> Karate</label>
                <label><input type="checkbox" value="other"> Other</label>
            </div>

            <!-- Training Goal -->
            <label for="goal">Training Goal</label>
            <textarea id="goal" rows="3" placeholder="Self-defense, fitness, discipline, confidence..."></textarea>

            <!-- Preferred Schedule -->
            <label for="schedule">Preferred Class Schedule</label>
            <select id="schedule" required>
                <option value="">Choose one</option>
                <option value="morning">Morning Classes</option>
                <option value="afternoon">Afternoon Classes</option>
                <option value="evening">Evening Classes</option>
                <option value="weekend">Weekend Classes</option>
            </select>

            <!-- Emergency Contact -->
            <label for="emergency">Emergency Contact</label>
            <input type="text" id="emergency" required>

            <!-- How did you hear about us -->
            <label for="referral">How did you hear about us?</label>
            <select id="referral">
                <option value="">Select one</option>
                <option value="friend">Friend or Family</option>
                <option value="social">Social Media</option>
                <option value="google">Google Search</option>
                <option value="event">Local Event</option>
                <option value="other">Other</option>
            </select>

            <!-- Additional Comments -->
            <label for="comments">Additional Comments</label>
            <textarea id="comments" rows="4"></textarea>

            <!-- Submit -->
            <button type="submit">Submit Registration</button>

        </form>
    </div>

</body>
</html>
